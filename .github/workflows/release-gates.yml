name: Release Gates

on:
  push:
    branches: ["dev", "main"]
  workflow_dispatch:

jobs:
  migrate-db-staging:
    if: ${{ github.ref_name == 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply Flyway migrations to staging
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/server/flyway/migrations:/flyway/sql" \
            redgate/flyway:11.12.0 \
            -url="${{ secrets.STAGING_DB_URL }}" \
            -user="${{ secrets.STAGING_DB_USER }}" \
            -password="${{ secrets.STAGING_DB_PASSWORD }}" \
            -baselineOnMigrate=true -baselineVersion=0 \
            -connectRetries=60 \
            migrate

  integration-core-feature:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ./test/test.csproj

      - name: Build
        run: dotnet build ./test/test.csproj --no-restore --configuration Release

      - name: Run one E2E core feature test
        run: dotnet test ./test/test.csproj --no-build --configuration Release --filter "FullyQualifiedName~TaskControllerTests.MoveTask_ValidData_WritesStatusHistory"

  k6-performance-smoke:
    runs-on: ubuntu-latest
    env:
      PERF_DB_HOST: ${{ vars.PERF_DB_HOST || '127.0.0.1' }}
      PERF_DB_PORT: ${{ vars.PERF_DB_PORT || '5432' }}
      PERF_DB_NAME: ${{ vars.PERF_DB_NAME || 'ToDoApp' }}
      PERF_DB_USER: ${{ vars.PERF_DB_USER || 'postgres' }}
      PERF_DB_PASSWORD: ${{ secrets.DB_PASSWORD || vars.PERF_DB_PASSWORD || 'postgres' }}
      PERF_API_HOST: ${{ vars.PERF_API_HOST || '127.0.0.1' }}
      PERF_API_PORT: ${{ vars.PERF_API_PORT || '5000' }}
      PERF_API_BIND_HOST: ${{ vars.PERF_API_BIND_HOST || '0.0.0.0' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ vars.PERF_DB_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || vars.PERF_DB_PASSWORD || 'postgres' }}
          POSTGRES_DB: ToDoApp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ vars.PERF_DB_USER || 'postgres' }} -d ToDoApp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve local perf endpoints
        run: |
          echo "API_BASE_URL=http://${PERF_API_HOST}:${PERF_API_PORT}" >> "$GITHUB_ENV"
          echo "ASPNETCORE_URLS=http://${PERF_API_BIND_HOST}:${PERF_API_PORT}" >> "$GITHUB_ENV"
          echo "FLYWAY_URL=jdbc:postgresql://${PERF_DB_HOST}:${PERF_DB_PORT}/${PERF_DB_NAME}" >> "$GITHUB_ENV"
          printf 'CONNECTION_STRING=Host=%s;Port=%s;Database=%s;Username=%s;Password=%s\n' \
            "$PERF_DB_HOST" "$PERF_DB_PORT" "$PERF_DB_NAME" "$PERF_DB_USER" "$PERF_DB_PASSWORD" >> "$GITHUB_ENV"

      - name: Apply Flyway migrations to local perf database
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/server/flyway/migrations:/flyway/sql" \
            redgate/flyway:11.12.0 \
            -url="$FLYWAY_URL" \
            -user="$PERF_DB_USER" \
            -password="$PERF_DB_PASSWORD" \
            -baselineOnMigrate=true \
            -connectRetries=60 \
            migrate

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Restore and build API
        run: |
          dotnet restore ./server/server.csproj
          dotnet build ./server/server.csproj --no-restore --configuration Release

      - name: Start API in background
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          nohup dotnet run --project ./server/server.csproj --configuration Release > api.log 2>&1 &

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS "$API_BASE_URL/swagger/v1/swagger.json" > /dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not start in time"
          cat api.log
          exit 1

      - name: Run k6 performance smoke test
        run: BASE_URL="$API_BASE_URL" k6 run ./LoadTesting.Tests/pipeline-smoke.js

      - name: Print API logs on failure
        if: failure()
        run: cat api.log

  staging-e2e-validation:
    if: ${{ github.ref_name == 'dev' }}
    runs-on: ubuntu-latest
    needs: migrate-db-staging
    env:
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
    steps:
      - name: Validate staging URL variable
        run: |
          if [ -z "$STAGING_BASE_URL" ]; then
            echo "STAGING_BASE_URL repository variable is required"
            exit 1
          fi

      - name: Run staging core-flow E2E smoke
        run: |
          BASE_URL="${STAGING_BASE_URL%/}"

          CREATE_RESPONSE=$(curl -fsS \
            -H "Content-Type: application/json" \
            -X POST "$BASE_URL/api/Task/CreateTask" \
            -d '{"title":"gha-staging-e2e","description":"release gate"}')

          TASK_ID=$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read()).get("id",""))' <<< "$CREATE_RESPONSE")

          if [ -z "$TASK_ID" ]; then
            echo "Failed to parse task id from CreateTask response"
            echo "$CREATE_RESPONSE"
            exit 1
          fi

          curl -fsS "$BASE_URL/api/Task/GetTaskById?id=$TASK_ID" > /dev/null

  migrate-db-production:
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    needs: [integration-core-feature, k6-performance-smoke]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply Flyway migrations to production
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/server/flyway/migrations:/flyway/sql" \
            redgate/flyway:11.12.0 \
            -url="${{ secrets.PRODUCTION_DB_URL }}" \
            -user="${{ secrets.PRODUCTION_DB_USER }}" \
            -password="${{ secrets.PRODUCTION_DB_PASSWORD }}" \
            -baselineOnMigrate=true -baselineVersion=0 \
            -connectRetries=60 \
            migrate

