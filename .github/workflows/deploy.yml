name: Deploy to production

on:
  workflow_run:
    workflows: ["Release Gates"]
    types: [completed]
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  delivery:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      # ---------------------------
      # VERSIONING
      # ---------------------------
      - name: Application version
        id: semver-app
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: ""
          major_pattern: "\\(MAJOR\\)"
          minor_pattern: "\\(MINOR\\)"
          bump_each_commit: true

      - name: Echo version
        run: |
          echo "Version: ${{ steps.semver-app.outputs.version }}"

      # ---------------------------
      # LOGIN TO GHCR (IMPORTANT FIX)
      # ---------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------
      # DEFINE CLEAN IMAGE NAMES (FIX FOR FORK ISSUE)
      # ---------------------------
      - name: Set image names
        run: |
          OWNER_LOWER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LOWER="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_PREFIX="ghcr.io/${OWNER_LOWER}/${REPO_LOWER}"
          echo "SERVER_IMAGE=${IMAGE_PREFIX}-api" >> $GITHUB_ENV
          echo "CLIENT_IMAGE=${IMAGE_PREFIX}-client" >> $GITHUB_ENV

      # ---------------------------
      # BUILD SERVER IMAGE
      # ---------------------------
      - name: Build and push SERVER image
        run: |
          docker build \
            -t $SERVER_IMAGE:staging \
            -t $SERVER_IMAGE:${{ steps.semver-app.outputs.version }} \
            -f Dockerfile \
            .

          docker push $SERVER_IMAGE --all-tags

      # ---------------------------
      # BUILD CLIENT IMAGE
      # ---------------------------
      - name: Build and push CLIENT image
        run: |
          docker build \
            -t $CLIENT_IMAGE:staging \
            -t $CLIENT_IMAGE:${{ steps.semver-app.outputs.version }} \
            -f client/Dockerfile \
            ./client

          docker push $CLIENT_IMAGE --all-tags

      # ---------------------------
      # CREATE GITHUB RELEASE
      # ---------------------------
      - name: Create release notes
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.semver-app.outputs.version }}
          name: Release ${{ steps.semver-app.outputs.version }}
          generateReleaseNotes: true
          allowUpdates: true
          body: |
            Version: ${{ steps.semver-app.outputs.version }}
            Commit: ${{ github.event.workflow_run.head_sha }}

            Images:
            - ${{ env.SERVER_IMAGE }}:${{ steps.semver-app.outputs.version }}
            - ${{ env.CLIENT_IMAGE }}:${{ steps.semver-app.outputs.version }}

      # ---------------------------
      # DEPLOY COMPOSE FILE
      # ---------------------------
      - name: Deliver Docker Compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.PROD_SERVER_IP }}
          username: ${{ vars.PROD_SERVER_USERNAME }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          source: compose.deploy.yml
          target: ~/dowa/

      # ---------------------------
      # REMOTE DEPLOY
      # ---------------------------
      - name: Run Docker Compose on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.PROD_SERVER_IP }}
          username: ${{ vars.PROD_SERVER_USERNAME }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            cd ~/dowa

            export VERSION="${{ steps.semver-app.outputs.version }}"

            docker compose -f compose.deploy.yml pull
            docker compose -f compose.deploy.yml up -d